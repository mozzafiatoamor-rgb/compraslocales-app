<script>
const LOGO='logo.png';
let SCRIPT_URL=localStorage.getItem('scriptUrl_compras')||'';
const S={screen:'setup',setupStep:1,tab:'home',sheetId:localStorage.getItem('sheetId_compras')||'',apiKey:localStorage.getItem('apiKey_compras')||'',connected:false,currentUser:null,usuarios:[],catalogo:[],proveedores:[],compras:[],fondos:[],pedidos:[],bitacora:[],loading:false,searchQuery:'',comprasFilter:'todos',cuadreDate:'',filterDate:'',comprasView:'pendientes',reportView:'cuadre',reportDateFrom:'',reportDateTo:'',homeView:'resumen',homeDateFrom:'',homeDateTo:''};

const Sheets={
  async read(sh,rg){const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/${encodeURIComponent(sh)}!${rg}?key=${S.apiKey}`);if(!r.ok)throw new Error(r.status);const d=await r.json();return d.values||[]},

// === SYNC QUEUE: Local-first save with background sync ===
let _syncRetryCount=0;
const SyncQueue={
  _key:'_syncQueue_compras',
  get queue(){try{return JSON.parse(localStorage.getItem(this._key)||'[]')}catch(e){return[]}},
  set queue(v){localStorage.setItem(this._key,JSON.stringify(v))},
  processing:false,
  add(items,onDone){
    const q=this.queue;q.push(...items.map(function(it){return{...it,_ts:Date.now()}}));this.queue=q;
    this.process(onDone);this.updateBadge()},
  async process(onDone){
    if(this.processing)return;const q=this.queue;if(!q.length){this.updateBadge();return}
    this.processing=true;this.updateBadge();
    const batch=q.splice(0,50);this.queue=q;
    try{
      const grouped={};batch.forEach(function(it){const k=it.sheet;if(!grouped[k])grouped[k]=[];grouped[k].push(it.values)});
      const items=Object.keys(grouped).map(function(sh){return{sheet:sh,rows:grouped[sh]}});
      try{await Sheets.batchAppend(items)}catch(batchErr){
        console.warn('batchAppend falló, usando append individual:',batchErr);
        for(const it of batch){await Sheets.append(it.sheet,it.values)}
      }
      _syncRetryCount=0;
      // Process price updates in parallel
      const priceUpdates=batch.filter(function(it){return it._priceUpdate});
      if(priceUpdates.length)await Promise.allSettled(priceUpdates.map(function(it){return Sheets.updatePrice(it._priceUpdate.producto,it._priceUpdate.precio)}));
      this.updateBadge();if(onDone)onDone(true);
      if(this.queue.length)this.process()
    }catch(e){
      console.error('SyncQueue error',e);
      toast('\u26a0\ufe0f Sync: '+e.message,1);
      _syncRetryCount++;const delay=Math.min(2000*Math.pow(2,_syncRetryCount),30000);
      const q2=this.queue;q2.unshift(...batch);this.queue=q2;
      this.updateBadge();
      if(onDone)onDone(false);
      setTimeout(()=>{this.processing=false;this.process()},delay);return
    }
    this.processing=false},
  get pending(){return this.queue.length},
  updateBadge(){const dot=document.querySelector('.status-dot');if(!dot)return;const n=this.pending;
    if(n>0){dot.style.background='var(--yellow)';dot.title=n+' pendientes de sync'}
    else if(S.connected){dot.style.background='var(--green)';dot.title='Conectado'}
    else{dot.style.background='var(--red)';dot.title='Desconectado'}}
};

pan class="quick-icon">\u{1F4B0}</span><span class="quick-label">Devolver</span></button>')+''+(canAddProduct()?'<button class="quick-btn" onclick="openModal(\'addProduct\')"><span class="quick-icon">\u2795</span><span class="quick-label">Producto</span></button><button class="quick-btn" onclick="openModal(\'addProv\')"><span class="quick-icon">\u{1F3EA}</span><span class="quick-label">Proveedor</span></button>':'<button class="quick-btn disabled"><span class="quick-icon">\u2795</span><span class="quick-label">Producto</span></button>')+'<button class="quick-btn" onclick="switchTab(\'reportes\')"><span class="quick-icon">\u{1F4CA}</span><span class="quick-label">Reportes</span></button><button class="quick-btn" onclick="Sheets.loadAll()"><span class="quick-icon">\u{1F504}</span><span class="quick-label">Actualizar</span></button></div>'+(ds.cerrado?'<div style="background:rgba(52,211,153,.1);border:2px solid rgba(52,211,153,.3);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center"><div style="font-size:24px;margin-bottom:6px">\u2705</div><div style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:4px">Turno Cerrado</div><div style="font-size:12px;color:var(--text2)">Cuadre del d\u00eda completado</div><div style="display:flex;gap:10px;margin-top:12px"><div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text2)">Gastado</div><div style="font-family:Space Mono;font-weight:700;color:var(--red)">'+fmt$(ds.gastado)+'</div></div><div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text2)">Devuelto</div><div style="font-family:Space Mono;font-weight:700;color:var(--blue)">'+fmt$(ds.devuelto)+'</div></div><div style="flex:1;background:var(--surface2);border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--text2)">Compras</div><div style="font-family function renderHomeDateFilter(){return'<div style="display:flex;gap:8px;margin:10px 0"><div class="form-group" style="flex:1;margin:0"><input class="form-input" type="date" value="'+(S.homeDateFrom||'')+'" onchange="S.homeDateFrom=this.value;render()" style="padding:8px 10px;font-size:12px" placeholder="Desde"></div><div class="form-group" style="flex:1;margin:0"><input class="form-input" type="date" value="'+(S.homeDateTo||'')+'" onchange="S.homeDateTo=this.value;render()" style="padding:8px 10px;font-size:12px" placeholder="Hasta"></div></div><div class="tab-pills" style="margin-bottom:12px"><button class="tab-pill" onclick="S.homeDateFrom=\'\';S.homeDateTo=\'\';render()">Todo</button><button class="tab-pill" onclick="setHomeRange(\'hoy\')">Hoy</button><button class="tab-pill" onclick="setHomeRange(\'semana\')">Semana</button><button class="tab-pill" onclick="setHomeRange(\'mes\')">Mes</button></div>'}
function setHomeRange(r){var t=new Date();if(r==='hoy'){S.homeDateFrom=t.toISOString().split('T')[0];S.homeDateTo=S.homeDateFrom}else if(r==='semana'){var d=t.getDay();var diff=t.getDate()-d+(d===0?-6:1);var mon=new Date(t);mon.setDate(diff);S.homeDateFrom=mon.toISOString().split('T')[0];S.homeDateTo=t.toISOString().split('T')[0]}else if(r==='mes'){S.homeDateFrom=t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-01';S.homeDateTo=t.toISOString().split('T')[0]}render()}
function getHomeCompras(){var f=S.compras;if(S.homeDateFrom)f=f.filter(function(c){return dateToISO(c.fecha)>=S.homeDateFrom});if(S.homeDateTo)f=f.filter(function(c){return dateToISO(c.fecha)<=S.homeDateTo});return f}
function renderHomeSection(view){var f=getHomeCompras();var totalGasto=f.reduce(function(s,c){return s+c.precio},0);var totalItems=f.length;if(view==='resumen')return renderHomeResumen(f,totalGasto,totalItems);if(view==='compras')return renderHomeCompras(f,totalGasto,totalItems);if(view==='productos')return renderHomeProductos(f,totalGasto);if(view==='proveedores')return renderHomeProveedores(f,totalGasto);return''}

function renderHomeCompras(f,totalGasto,totalItems){return'<div style="background:var(--surface);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:var(--text2)">TOTAL GASTADO</div><div style="font-family:Space Mono;font-size:28px;font-weight:700;color:var(--red);margin:4px 0">'+fmt$(totalGasto)+'</div><div style="font-size:12px;color:var(--text2)">'+totalItems+' compras</div></div>'+(f.length?f.slice(0,50).map(function(c){return'<div class="record-item"><div class="record-top"><span class="record-product">'+c.producto+'</span><span class="record-qty">'+fmt$(c.precio)+'</span></div><div class="record-meta"><span>'+c.cantidad+' '+c.unidad+'</span><span>\u{1F4C5} '+c.fecha+'</span><span>\u{1F3EA} '+c.proveedor+'</span><span>\u{1F464} '+c.comprador+'</span></div></div>'}).join(''):'<div class="empty-state" style="padding:20px"><p>Sin compras en este periodo</p></div>')}
function renderHomeProductos(f,totalGasto){var byProd={};f.forEach(function(c){var p=c.producto;if(!byProd[p])byProd[p]={total:0,qty:0,unidad:c.unidad,cat:c.categoria};byProd[p].total+=c.precio;byProd[p].qty+=c.cantidad});var keys=Object.keys(byProd).sort(function(a,b){return byProd[b].total-byProd[a].total});return'<div style="background:var(--surface);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:var(--text2)">PRODUCTOS DISTINTOS</div><div style="font-family:Space Mono;font-size:32px;font-weight:700;color:var(--orange);margin:4px 0">'+keys.length+'</div></div>'+(keys.length?'<div class="card">'+keys.map(function(k,i){var p=byProd[k];var pct=totalGasto>0?Math.round(p.total/totalGasto*100):0;return'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;color:var(--text2);min-width:24px">#'+(i+1)+'</span><div style="flex:1"><div style="font-size:13px;font-weight:600">'+k+'</div><div style="font-size:11px;color:var(--text2)">'+p.cat+' \u00b7 '+p.qty+' '+p.unidad+'</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><div style="flex:1;background:var(--surface3);border-radius:4px;height:4px;overflow:hidden"><div style="background:var(--orange);height:100%;width:'+pct+'%;border-radius:4px"></div></div><span style="font-size:10px;color:var(--text2)">'+pct+'%</span></div></div><span style="font-family:Space Mono;font-weight:700;font-size:13px;color:var(--red)">'+fmt$(p.total)+'</span></div>'}).join('')+'</div>':'')}
function renderHomeProveedores(f,totalGasto){var byProv={};f.forEach(function(c){var p=c.proveedor||'Sin proveedor';if(!byProv[p])byProv[p]={total:0,items:0};byProv[p].total+=c.precio;byProv[p].items++});var keys=Object.keys(byProv).sort(function(a,b){return byProv[b].total-byProv[a].total});return'<div style="background:var(--surface);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:var(--text2)">PROVEEDORES</div><div style="font-family:Space Mono;font-size:32px;font-weight:700;color:var(--green);margin:4px 0">'+keys.length+'</div></div>'+(keys.length?'<div class="card">'+keys.map(function(k){var p=byProv[k];var pct=totalGasto>0?Math.round(p.total/totalGasto*100):0;return'<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:600">\u{1F3EA} '+k+'</span><span style="font-family:Space Mono;font-weight:700;color:var(--green)">'+fmt$(p.total)+'</span></div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--surface3);border-radius:4px;height:4px;overflow:hidden"><div style="background:var(--green);height:100%;width:'+pct+'%;border-radius:4px"></div></div><span style="font-size:11px;color:var(--text2)">'+p.items+' compras \u00b7 '+pct+'%</span></div></div>'}).join('')+'</div>':'')}

function getPedidosPendientes(){var grouped={};S.pedidos.filter(function(p){return p.estado!=='Completado'}).forEach(function(p){var key=p.fecha+'|'+p.titulo;if(!grouped[key])grouped[key]={fecha:p.fecha,hora:p.hora,titulo:p.titulo,creador:p.creador,items:[]};grouped[key].items.push(p)});return grouped}

function getFilteredCompras(){var f=S.compras;if(S.reportDateFrom){f=f.filter(function(c){return dateToISO(c.fecha)>=S.reportDateFrom})}if(S.reportDateTo){f=f.filter(function(c){return dateToISO(c.fecha)<=S.reportDateTo})}return f}
function renderResumenGastos(){var f=getFilteredCompras();var totalGasto=f.reduce(function(s,c){return s+c.precio},0);var totalItems=f.length;var byCat={};var byProv={};var byProd={};var byUser={};f.forEach(function(c){var cat=c.categoria||'Sin cat';if(!byCat[cat])byCat[cat]=0;byCat[cat]+=c.precio;var prov=c.proveedor||'Sin prov';if(!byProv[prov])byProv[prov]=0;byProv[prov]+=c.precio;var prod=c.producto;if(!byProd[prod])byProd[prod]={total:0,qty:0,unidad:c.unidad};byProd[prod].total+=c.precio;byProd[prod].qty+=c.cantidad;var user=c.comprador||'';if(user){if(!byUser[user])byUser[user]=0;byUser[user]+=c.precio}});var catKeys=Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a]});var provKeys=Object.keys(byProv).sort(function(a,b){return byProv[b]-byProv[a]});var prodKeys=Object.keys(byProd).sort(function(a,b){return byProd[b].total-byProd[a].total});var userKeys=Object.keys(byUser).sort(function(a,b){return byUser[b]-byUser[a]});
return'<div style="display:flex;gap:8px;margin-bottom:12px"><div class="form-group" style="flex:1;margin:0"><label class="form-label">Desde</label><input class="form-input" type="date" value="'+(S.reportDateFrom||'')+'" onchange="S.reportDateFrom=this.value;render()" style="padding:8px 10px;font-size:12px"></div><div class="form-group" style="flex:1;margin:0"><label class="form-label">Hasta</label><input class="form-input" type="date" value="'+(S.reportDateTo||'')+'" onchange="S.reportDateTo=this.value;render()" style="padding:8px 10px;font-size:12px"></div></div><div class="tab-pills" style="margin-bottom:12px"><button class="tab-pill" onclick="S.reportDateFrom=\'\';S.reportDateTo=\'\';render()">Todo</button><button class="tab-pill" onclick="setReportRange(\'hoy\')">Hoy</button><button class="tab-pill" onclick="setReportRange(\'semana\')">Semana</button><button class="tab-pill" onclick="setReportRange(\'mes\')">Mes</button></div><div style="background:var(--surface);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:11px;color:var(--text2)">TOTAL GASTADO</div><div style="font-family:Space Mono;font-size:32px;font-weight:700;color:var(--red);margin:4px 0">'+fmt$(totalGasto)+'</div><div style="font-size:12px;color:var(--text2)">'+totalItems+' compras</div></div><div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title" style="font-size:14px">\u{1F4C1} Por Categor\u00eda</span></div>'+catKeys.map(function(k){var pct=totalGasto>0?Math.round(byCat[k]/totalGasto*100):0;return'<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:600">'+k+'</span><span style="font-family:Space Mono;font-weight:700;color:var(--accent)">'+fmt$(byCat[k])+'</span></div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--surface3);border-radius:4px;height:4px;overflow:hidden"><div style="background:var(--accent);height:100%;width:'+pct+'%;border-radius:4px"></div></div><span style="font-size:11px;color:var(--text2);min-width:32px;text-align:right">'+pct+'%</span></div></div>'}).join('')+'</div><div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title" style="font-size:14px">\u{1F3EA} Por Proveedor</span></div>'+provKeys.map(function(k){var pct=totalGasto>0?Math.round(byProv[k]/totalGasto*100):0;return'<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:600">'+k+'</span><span style="font-family:Space Mono;font-weight:700;color:var(--orange)">'+fmt$(byProv[k])+'</span></div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--surface3);border-radius:4px;height:4px;overflow:hidden"><div style="background:var(--orange);height:100%;width:'+pct+'%;border-radius:4px"></div></div><span style="font-size:11px;color:var(--text2);min-width:32px;text-align:right">'+pct+'%</span></div></div>'}).join('')+'</div><div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title" style="font-size:14px">\u{1F6D2} Top Productos</span></div>'+prodKeys.slice(0,15).map(function(k,i){var p=byProd[k];return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="font-size:12px;color:var(--text2);min-width:20px">#'+(i+1)+'</span><div style="flex:1"><div style="font-size:13px;font-weight:600">'+k+'</div><div style="font-size:11px;color:var(--text2)">'+p.qty+' '+p.unidad+'</div></div><span style="font-family:Space Mono;font-weight:700;font-size:13px;color:var(--red)">'+fmt$(p.total)+'</span></div>'}).join('')+'</div>'+(userKeys.length>1?'<div class="card" style="margin-bottom:12px"><div class="card-header"><span class="card-title" style="font-size:14px">\u{1F464} Por Comprador</span></div>'+userKeys.map(function(k){var pct=totalGasto>0?Math.round(byUser[k]/totalGasto*100):0;return'<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:600">'+k+'</span><span style="font-family:Space Mono;font-weight:700;color:var(--green)">'+fmt$(byUser[k])+'</span></div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;background:var(--surface3);border-radius:4px;height:4px;overflow:hidden"><div style="background:var(--green);height:100%;width:'+pct+'%;border-radius:4px"></div></div><span style="font-size:11px;color:var(--text2);min-width:32px;text-align:right">'+pct+'%</span></div></div>'}).join('')+'</div>':'')}
function setReportRange(r){var t=new Date();if(r==='hoy'){S.reportDateFrom=t.toISOString().split('T')[0];S.reportDateTo=S.reportDateFrom}else if(r==='semana'){var d=t.getDay();var diff=t.getDate()-d+(d===0?-6:1);var mon=new Date(t);mon.setDate(diff);S.reportDateFrom=mon.toISOString().split('T')[0];S.reportDateTo=t.toISOString().split('T')[0]}else if(r==='mes'){S.reportDateFrom=t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-01';S.reportDateTo=t.toISOString().split('T')[0]}render()}

function dateToISO(d){const p=d.split('/');return p[2]+'-'+p[1]+'-'+p[0]}
function isoToDate(d){const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}

function renderCatalogo(){const q=S.searchQuery.toLowerCase();let f=S.catalogo;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q)||p.categoria.toLowerCase().includes(q));return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">\u{1F4E6} Cat\u00e1logo ('+S.catalogo.length+')</span>'+(canAddProduct()?'<button class="btn btn-primary btn-sm" onclick="openModal(\'addProduct\')">+ Producto</button>':'')+'</div><div class="search-bar"><span>\u{1F50D}</span><input placeholder="Buscar..." value="'+S.searchQuery+'" oninput="S.searchQuery=this.value;filterResults()"></div><div class="tab-pills"><button class="tab-pill '+(S.comprasFilter==='todos'?'active':'')+'" onclick="S.comprasFilter=\'todos\';filterResults()">Todos</button>'+getCats().map(c=>'<button class="tab-pill '+(S.comprasFilter===c?'active':'')+'" onclick="S.comprasFilter=\''+c+'\';filterResults()">'+c+'</button>').join('')+'</div><div id="resultsList">'+renderCatList(f)+'</div>'}

function renderCatList(f){if(S.comprasFilter!=='todos')f=f.filter(p=>p.categoria===S.comprasFilter);return!f.length?'<div class="empty-state"><div class="empty-icon">\u{1F4E6}</div><p>Sin productos</p></div>':f.map(p=>'<div class="inv-item" style="cursor:'+(isAdmin()?'pointer':'default')+'" '+(isAdmin()?'onclick="openEditProd(\''+p.id+'\')"':'')+'>'+(isAdmin()?'<button class="del-btn" onclick="event.stopPropagation();confirmDelProd(\''+p.producto.replace(/'/g,"\\'")+'\')">\u{1F5D1}</button>':'')+'<div style="flex:1;padding-right:'+(isAdmin()?'30px':'0')+'"><div class="inv-name">'+p.producto+'</div><div class="inv-cat">'+p.categoria+' \u00b7 '+p.unidad+(p.precioRef?' \u00b7 Ref: '+fmt$(p.precioRef):'')+'</div></div>'+(isAdmin()?'<span style="color:var(--text2);font-size:16px;margin-right:30px">\u270f\ufe0f</span>':'')+'</div>').join('')}

function renderBitacora(){const q=S.searchQuery.toLowerCase();let f=S.bitacora;if(S.filterDate)f=f.filter(b=>b.fecha===S.filterDate);if(q)f=f.filter(b=>b.accion.toLowerCase().includes(q)||b.detalle.toLowerCase().includes(q)||b.usuario.toLowerCase().includes(q));return'<div style="margin-bottom:14px"><span class="card-title" style="margin:0">\u{1F4DC} Bit\u00e1cora</span></div><div style="display:flex;gap:8px;margin-bottom:10px"><div class="tab-pills" style="flex:1;margin:0"><button class="tab-pill '+(S.filterDate===''?'active':'')+'" onclick="S.filterDate=\'\';filterResults()">Todas</button><button class="tab-pill '+(S.filterDate===today()?'active':'')+'" onclick="S.filterDate=today();filterResults()">Hoy</button></div><input type="date" class="form-input" style="width:140px;padding:7px 10px;font-size:12px" value="'+(S.filterDate?dateToISO(S.filterDate):'')+'" onchange="S.filterDate=this.value?isoToDate(this.value):\'\';filterResults()"></div><div class="search-bar"><span>\u{1F50D}</span><input placeholder="Buscar..." value="'+S.searchQuery+'" oninput="S.searchQuery=this.value;filterResults()"></div><div id="resultsList">'+renderLogList(f)+'</div>'}
function renderLogList(f){return!f.length?'<div class="empty-state"><div class="empty-icon">\u{1F4DC}</div><p>Sin registros</p></div>':f.map(b=>'<div class="record-item"><div style="font-size:13px;font-weight:600">'+b.accion+'</div><div style="font-size:12px;margin:4px 0">'+b.detalle+'</div><div class="record-meta"><span>\u{1F4C5} '+b.fecha+'</span><span>\u{1F552} '+b.hora+'</span><span>\u{1F464} '+b.usuario+'</span></div></div>').join('')}

function filterResults(){const l=document.getElementById('resultsList');if(!l)return;const q=S.searchQuery.toLowerCase();if(S.tab==='compras'){let f=S.compras;if(S.filterDate)f=f.filter(c=>c.fecha===S.filterDate);if(q)f=f.filter(c=>c.producto.toLowerCase().includes(q)||c.proveedor.toLowerCase().includes(q));l.innerHTML=renderComprasList(f)}
else if(S.tab==='catalogo'){let f=S.catalogo;if(q)f=f.filter(p=>p.producto.toLowerCase().includes(q)||p.categoria.toLowerCase().includes(q));l.innerHTML=renderCatList(f)}
else if(S.tab==='pedidos'){let pedsFilt=S.pedidos;if(S.filterDate)pedsFilt=pedsFilt.filter(function(p){return p.fecha===S.filterDate});const grouped={};pedsFilt.forEach(function(p){const key=p.fecha+' | '+p.titulo;if(!grouped[key])grouped[key]={fecha:p.fecha,hora:p.hora,titulo:p.titulo,creador:p.creador,estado:p.estado,items:[],total:0};grouped[key].items.push(p);grouped[key].total+=p.subtotal});const keys=Object.keys(grouped);const filtered=q?keys.filter(function(k){return k.toLowerCase().includes(q)||grouped[k].items.some(function(i){return i.producto.toLowerCase().includes(q)})}):keys;l.innerHTML=renderPedidosList(filtered,grouped)}
else if(S.tab==='bitacora'){let f=S.bitacora;if(S.filterDate)f=f.filter(b=>b.fecha===S.filterDate);if(q)f=f.filter(b=>b.accion.toLowerCase().includes(q)||b.detalle.toLowerCase().includes(q));l.innerHTML=renderLogList(f)}}

let modalType=null;
function renderModal(){if(!modalType)return'';let c='';if(modalType==='compra')c=fmCompra();if(modalType==='checkout')c=fmCheckout();if(modalType==='fondo')c=fmFondo();if(modalType==='devolucion')c=fmDevolucion();if(modalType==='pedido')c=fmPedido();if(modalType==='addProduct')c=fmAddProd();if(modalType==='editProduct')c=fmEditProd();if(modalType==='addProv')c=fmAddProv();if(modalType==='settings')c=fmSettings();if(modalType==='userMenu')c=fmUser();if(modalType==='editCompra')c=fmEditCompra();if(modalType==='editPedidoItem')c=fmEditPedidoItem();if(modalType==='adminCompra')c=fmAdminCompra();if(modalType==='addToPedido')c=fmAddToPedido();return'<div class="modal-overlay active" id="modal" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-handle"></div>'+c+'</div></div>'}
function openModal(t){if((t==='addProduct'||t==='addProv')&&!canAddProduct()){toast('Solo admin/cocinero',1);hideWorking();return}if(t==='fondo'&&!canEditMoney()){toast('Solo admin/cajero',1);hideWorking();return}if(t==='pedido'&&!canOrder()){toast('Solo admin/cocinero',1);hideWorking();return}modalType=t;if(t!=='compra')clearCartCompra();_cartPedido=[];_acSelected={};render()}
function closeModal(){if(modalType==='compra'&&_cartCompra.length>0){showConfirm('\u{1F6D2} Carrito pendiente','Tienes '+_cartCompra.length+' compras sin guardar. Se mantendr\u00e1n para despu\u00e9s.',function(){modalType=null;render()});return}modalType=null;clearCartCompra();render()}

function fmUser(){return'<div class="modal-title">\u{1F464} Mi Cuenta</div><div style="text-align:center;margin-bottom:20px"><div style="width:60px;height:60px;border-radius:16px;background:var(--accent);color:#1a120e;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 12px">'+uInit()+'</div><div style="font-size:18px;font-weight:700">'+uName()+'</div><div style="font-size:13px;color:var(--text2);margin-top:4px">@'+(S.currentUser?.usuario||'')+'</div></div><button class="btn btn-danger" onclick="logout()">\u{1F6AA} Cerrar Sesi\u00f3n</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>'}


function delSingleCompra(id,row,prod){if(!canEditItems())return;showConfirm('Eliminar','Eliminar compra de '+prod+'?',async function(){showWorking();try{await Sheets.deleteRow('\u{1F9FE} Compras',row);S.compras=S.compras.filter(function(c){return c._row!==row});logAction('Compra eliminada',prod,'delete');toast('Eliminada');hideWorking();render();setTimeout(function(){Sheets.loadAll()},500)}catch(e){toast('Error',1);hideWorking()}})}
function undoCheckItem(producto,titulo,fecha){if(!canEditItems())return;var tag='[PED:'+titulo+'|'+fecha+']';var tagOld='[PED:'+titulo+']';var compras=S.compras.filter(function(c){return c.producto.trim().toLowerCase()===producto.trim().toLowerCase()&&((c.notas||'').indexOf(tag)!==-1||((c.notas||'').indexOf(tagOld)!==-1&&(c.notas||'').indexOf('|')===-1&&c.fecha===fecha))});if(!compras.length){toast('No se encontraron compras para deshacer',1);hideWorking();return}var totalQty=compras.reduce(function(s,c){return s+c.cantidad},0);var totalMoney=compras.reduce(function(s,c){return s+c.precio},0);showConfirm('Deshacer Compra','Eliminar '+compras.length+' registro(s) de '+producto+'?\n\nCantidad: '+totalQty+'\nTotal: '+fmt$(totalMoney)+'\n\nEl item volver\u00e1 a pendiente para corregirlo.',async function(){var results=await Promise.allSettled(compras.map(function(c){return Sheets.deleteRow('\u{1F9FE} Compras',c._row)}));var ok=results.filter(function(r){return r.status==='fulfilled'}).length;if(ok>0){var deletedRows=compras.map(function(c){return c._row});S.compras=S.compras.filter(function(c){return deletedRows.indexOf(c._row)===-1});logAction('Compra deshecha (pedido)',producto+' x'+totalQty+' '+fmt$(totalMoney)+' ['+titulo+']','edit');toast('\u2705 '+producto+' vuelve a pendiente');render();setTimeout(function(){Sheets.loadAll()},500)}else{toast('Error eliminando registros',1)}})}
var _checkedItems={};var _expandedPedidos={};
function togglePedido(key){var mc=document.querySelector('.main-content');var scrollY=mc?mc.scrollTop:0;if(_expandedPedidos[key])delete _expandedPedidos[key];else _expandedPedidos[key]=true;render();if(mc){mc.scrollTop=scrollY;setTimeout(function(){var el=document.getElementById('ped_'+key);if(el&&_expandedPedidos[key])el.scrollIntoView({behavior:'smooth',block:'nearest'})},50)}}
function toggleCheckItem(uid,faltante){var row=document.getElementById('ckRow_'+uid);var box=document.getElementById('ckBox_'+uid);var fields=document.getElementById('ckFields_'+uid);if(!row||!box||!fields)return;if(_checkedItems[uid]){delete _checkedItems[uid];row.style.opacity='0.5';row.style.background='var(--surface2)';box.style.background='';box.style.borderColor='var(--surface3)';box.innerHTML='';fields.style.display='none'}else{_checkedItems[uid]=true;row.style.opacity='1';row.style.background='rgba(52,211,153,.08)';box.style.background='var(--green)';box.style.borderColor='var(--green)';box.innerHTML='\u2713';fields.style.display='block'}updateBatchBtns()}
function updateBatchBtns(){var cards=document.querySelectorAll('[id^="ckBatchBtn_"]');cards.forEach(function(btn){var prefix=btn.id.replace('ckBatchBtn_','');var hasChecked=Object.keys(_checkedItems).some(function(uid){return uid.startsWith(prefix)});btn.style.display=hasChecked?'block':'none';var count=Object.keys(_checkedItems).filter(function(uid){return uid.startsWith(prefix)}).length;var b=btn.querySelector('button');if(b)b.textContent='\u{1F6D2} Registrar '+count+' Compra'+(count>1?'s':'')+' Marcadas'})}
async function submitBatchCheckout(titulo,fecha,prefix){showWorking();var uids=Object.keys(_checkedItems).filter(function(uid){return uid.startsWith(prefix)});if(!uids.length){toast('Marca al menos uno',1);hideWorking();return}var errors=[];for(var uid of uids){var qty=parseFloat(document.getElementById('ckQ_'+uid)?.value)||0;var price=parseFloat(document.getElementById('ckP_'+uid)?.value)||0;var prov=document.getElementById('ckPv_'+uid)?.value||'';if(qty<=0||price<=0||!prov){var row=document.getElementById('ckRow_'+uid);var name=row?.querySelector('[style*="font-weight:700"]')?.textContent||'';errors.push(name||uid)}}if(errors.length>0){toast('Completa datos de: '+errors.join(', '),1);hideWorking();return}var n=now();var syncItems=[];var detalles=[];for(var uid of uids){var qty=parseFloat(document.getElementById('ckQ_'+uid).value);var price=parseFloat(document.getElementById('ckP_'+uid).value);var prov=document.getElementById('ckPv_'+uid).value;var ticket=document.getElementById('ckT_'+uid)?.value||'SI';var row=document.getElementById('ckRow_'+uid);var prodName=row?.querySelector('[style*="font-weight:700"]')?.textContent||'';var p=S.catalogo.find(function(x){return x.producto===prodName});var pedItem=S.pedidos.find(function(x){return x.titulo===titulo&&x.producto===prodName});var unidad=pedItem?.unidad||p?.unidad||'';var total=qty*price;var id=nextId('C',S.compras);S.compras.unshift({id:id,fecha:n.date,hora:n.time,categoria:p?.categoria||'',producto:prodName,cantidad:qty,unidad:unidad,precio:total,proveedor:prov,ticket:ticket,comprador:uName(),notas:'[PED:'+titulo+'|'+fecha+']',_row:9999});syncItems.push({sheet:'\u{1F9FE} Compras',values:[id,n.date,n.time,p?.categoria||'',prodName,qty,unidad,total,prov,ticket,uName(),'[PED:'+titulo+'|'+fecha+']'],_priceUpdate:{producto:prodName,precio:price}});detalles.push(prodName+' x'+qty+' '+fmt$(total));delete _checkedItems[uid]}syncItems.push({sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Compras de pedido ('+titulo+')',detalles.join(', '),'compra']});SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast('\u2705 '+detalles.length+' compra'+(detalles.length>1?'s':'')+' registradas');hideWorking();render()}

var _checkoutItem=null;
function openCheckoutItem(titulo,fecha,producto,faltante,unidad,precioRef){_checkoutItem={titulo:titulo,fecha:fecha,producto:producto,faltante:faltante,unidad:unidad,precioRef:precioRef};modalType='checkout';render();setTimeout(function(){var m=document.getElementById('modal');if(m)m.scrollTop=0},50)}
function fmCheckout(){if(!_checkoutItem)return'';var c=_checkoutItem;return'<div class="modal-title" style="color:var(--green)">\u{1F6D2} Registrar Compra</div><div style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:16px"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">Pedido: '+c.titulo+'</div><div style="font-size:16px;font-weight:700">'+c.producto+'</div><div style="font-size:13px;color:var(--text2);margin-top:4px">Faltante: <strong style="color:var(--accent)">'+c.faltante+' '+c.unidad+'</strong> \u00b7 Ref: '+fmt$(c.precioRef)+'</div></div><div style="display:flex;gap:10px"><div class="form-group" style="flex:1"><label class="form-label">Cantidad comprada</label><input class="form-input" id="ckQty" type="number" inputmode="decimal" value="'+c.faltante+'" min="0.1" step="0.1" oninput="calcCheckout()"></div><div class="form-group" style="flex:1"><label class="form-label">Precio Unitario $</label><input class="form-input" id="ckPrice" type="number" inputmode="decimal" placeholder="'+c.precioRef.toFixed(2)+'" min="0" step="0.01" oninput="calcCheckout()"></div></div><div id="ckTotal"></div><div class="form-group"><label class="form-label">Proveedor</label><div id="ckProvWrap"><div class="autocomplete-wrap"><input class="form-input" id="ckProv" placeholder="\u{1F50D} Buscar proveedor..." oninput="acInputFor(\'ckProv\')" onfocus="acInputFor(\'ckProv\')" autocomplete="off"><div class="autocomplete-list" id="ckProvList"></div></div></div></div><div class="form-group"><label class="form-label">\u00bfTiene ticket?</label><select class="form-select" id="ckTicket"><option value="SI">\u{1F9FE} S\u00ed</option><option value="NO">\u274c No</option></select></div><div class="form-group"><label class="form-label">Notas (opcional)</label><textarea class="form-textarea" id="ckNotas" placeholder="Observaciones..."></textarea></div><button class="btn btn-success" onclick="submitCheckout()">\u2705 Guardar Compra</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="_checkoutItem=null;closeModal()">\u2716 Cancelar</button>'}
function calcCheckout(){var qty=parseFloat(document.getElementById('ckQty')?.value)||0;var price=parseFloat(document.getElementById('ckPrice')?.value)||0;var el=document.getElementById('ckTotal');if(!el)return;if(qty>0&&price>0){var total=qty*price;el.innerHTML='<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:14px;text-align:center;color:var(--green)">Total: <strong>'+fmt$(total)+'</strong></div>'}else{el.innerHTML=''}}
async function submitCheckout(){showWorking();if(!_checkoutItem)return;var qty=parseFloat(document.getElementById('ckQty')?.value)||0;var price=parseFloat(document.getElementById('ckPrice')?.value)||0;var prov=acGetVal('ckProv');var ticket=document.getElementById('ckTicket').value;var notas=document.getElementById('ckNotas').value;if(qty<=0||price<=0){toast('Pon cantidad y precio',1);hideWorking();return}if(!prov){toast('Selecciona proveedor',1);hideWorking();return}var total=qty*price;var c=_checkoutItem;var p=S.catalogo.find(function(x){return x.producto===c.producto});var id=nextId('C',S.compras);var n=now();var pedTag='[PED:'+c.titulo+'|'+c.fecha+']';var fullNotas=notas?(pedTag+' '+notas):pedTag;var detalle=c.producto+' x'+qty+' = '+fmt$(total)+' ('+prov+') - Pedido: '+c.titulo;S.compras.unshift({id:id,fecha:n.date,hora:n.time,categoria:p?.categoria||'',producto:c.producto,cantidad:qty,unidad:c.unidad,precio:total,proveedor:prov,ticket:ticket,comprador:uName(),notas:fullNotas,_row:9999});SyncQueue.add([{sheet:'\u{1F9FE} Compras',values:[id,n.date,n.time,p?.categoria||'',c.producto,qty,c.unidad,total,prov,ticket,uName(),fullNotas],_priceUpdate:{producto:c.producto,precio:price}},{sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Compra de pedido',detalle,'compra']}],function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast('\u2705 '+c.producto+' registrado');_checkoutItem=null;closeModal();hideWorking();render()}
function fmCompra(){return'<div class="modal-title">\u{1F6D2} Registrar Compra</div>'+(_cartCompra.length>0?'<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--green);display:flex;justify-content:space-between;align-items:center"><span>\u{1F4BE} '+_cartCompra.length+' compras recuperadas del carrito</span><button onclick="clearCartCompra();render()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer">\u{1F5D1} Vaciar</button></div>':'')+'<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:8px"><span>\u{1F464}</span><strong>'+uName()+'</strong></div><div class="form-group"><label class="form-label">Producto</label><div id="fCPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fCP" placeholder="\u{1F50D} Buscar producto..." oninput="acInputFor(\'fCP\')" onfocus="acInputFor(\'fCP\')" autocomplete="off"><div class="autocomplete-list" id="fCPList"></div></div></div></div><div style="display:flex;gap:10px"><div class="form-group" style="flex:1"><label class="form-label">Cantidad</label><input class="form-input" id="fCQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1" oninput="calcTotal()"></div><div class="form-group" style="flex:1"><label class="form-label">Precio Unitario $</label><input class="form-input" id="fCPr" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" oninput="calcTotal()"></div></div><div id="totalPreview"></div><div class="form-group"><label class="form-label">Proveedor</label><div id="fCPvWrap"><div class="autocomplete-wrap"><input class="form-input" id="fCPv" placeholder="\u{1F50D} Buscar proveedor..." oninput="acInputFor(\'fCPv\')" onfocus="acInputFor(\'fCPv\')" autocomplete="off"><div class="autocomplete-list" id="fCPvList"></div></div></div></div><div class="form-group"><label class="form-label">\u00bfTiene ticket?</label><select class="form-select" id="fCT"><option value="SI">\u{1F9FE} S\u00ed</option><option value="NO">\u274c No</option></select></div><div class="form-group"><label class="form-label">Notas (opcional)</label><textarea class="form-textarea" id="fCN" placeholder="Observaciones..."></textarea></div><button class="btn btn-secondary" onclick="addToCartCompra()">\u2795 Agregar a lista</button><div id="cartCompra">'+renderCartCompra()+'</div><div class="cart-divider"></div><button class="btn btn-primary" onclick="submitCartCompra()" '+(_cartCompra.length===0?'disabled':'')+' id="btnSaveCompra">\u2705 Guardar Todo ('+_cartCompra.length+')</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">\u2716 Cerrar</button>'}

function fmAddProd(){if(!canAddProduct())return'<div class="modal-title">\u{1F512} Solo admin</div>';const cats=getCats();return'<div class="modal-title">\u2795 Nuevo Producto</div><div class="form-group"><label class="form-label">Categor\u00eda</label><select class="form-select" id="fNPC"><option value="">Seleccionar...</option>'+cats.map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join('')+'<option value="__new__">\uff0b Nueva...</option></select></div><div id="newCatField" style="display:none"><div class="form-group"><label class="form-label">Nueva Categor\u00eda</label><input class="form-input" id="fNCN" placeholder="Nombre"></div></div><div class="form-group"><label class="form-label">Producto</label><input class="form-input" id="fNPN" placeholder="Ej: Tomate Saladette kg" oninput="checkDupProd(this.value)"><div id="dupProdWarn"></div></div><div class="form-group"><label class="form-label">Unidad</label><select class="form-select" id="fNPU"><option value="kg">kg</option><option value="lt">lt</option><option value="pza">pza</option><option value="paq">paq</option><option value="caja">caja</option><option value="bolsa">bolsa</option><option value="bote">bote</option><option value="manojo">manojo</option></select></div><div class="form-group"><label class="form-label">Precio Referencia $ (opcional)</label><input class="form-input" id="fNPP" type="number" inputmode="decimal" placeholder="0.00" step="0.01"></div><button class="btn btn-secondary" onclick="addToCartNewProd()">\u2795 Agregar a lista</button><div id="cartNewProd">'+renderCartNewProd()+'</div><div class="cart-divider"></div><button class="btn btn-success" onclick="submitCartNewProd()" '+(_cartNewProd.length===0?'disabled':'')+' id="btnSaveNewProd">\u2705 Guardar Todo ('+_cartNewProd.length+')</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">\u2716 Cerrar</button>'}
function checkDupProd(val){var el=document.getElementById('dupProdWarn');if(!el)return;var v=val.trim().toLowerCase();if(v.length<2){el.innerHTML='';return}var matches=S.catalogo.filter(function(p){return p.producto.toLowerCase().includes(v)});var alsoCart=_cartNewProd.filter(function(c){return c.nombre.toLowerCase().includes(v)});if(matches.length>0||alsoCart.length>0){var list=matches.map(function(p){return'<div style="padding:4px 0;font-size:12px">\u26a0\ufe0f <strong>'+p.producto+'</strong> <span style="color:var(--text2)">('+p.categoria+' \u00b7 '+p.unidad+')</span></div>'}).join('');var cartList=alsoCart.map(function(c){return'<div style="padding:4px 0;font-size:12px">\u{1F4CB} <strong>'+c.nombre+'</strong> <span style="color:var(--text2)">(en lista)</span></div>'}).join('');el.innerHTML='<div style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:8px 12px;margin-top:6px"><div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px">Productos similares encontrados:</div>'+list+cartList+'</div>'}else{el.innerHTML=''}}

let _cartCompra=(function(){try{var d=localStorage.getItem('_cartCompra');return d?JSON.parse(d):[]}catch(e){return[]}})();

function addToCartCompra(){const prod=acGetVal('fCP'),qty=document.getElementById('fCQ').value,precioUnit=document.getElementById('fCPr').value,prov=acGetVal('fCPv'),ticket=document.getElementById('fCT').value,notas=document.getElementById('fCN').value;if(!prod||!qty||!precioUnit||!prov){toast('Completa campos',1);hideWorking();return}const p=S.catalogo.find(x=>x.producto===prod);const total=parseFloat(qty)*parseFloat(precioUnit);_cartCompra.push({cat:p?.categoria||'',prod,qty:parseFloat(qty),unidad:p?.unidad||'',precioUnit:parseFloat(precioUnit),precio:total,prov,ticket,notas});saveCartCompra();toast(prod+' '+fmt$(total));acClearC('fCP');document.getElementById('fCQ').value='';document.getElementById('fCPr').value='';document.getElementById('fCN').value='';var tp=document.getElementById('totalPreview');if(tp)tp.innerHTML='';document.getElementById('cartCompra').innerHTML=renderCartCompra();const btn=document.getElementById('btnSaveCompra');if(btn){btn.disabled=false;btn.innerHTML='\u2705 Guardar Todo ('+_cartCompra.length+')'}}
function removeCartCompra(i){_cartCompra.splice(i,1);saveCartCompra();document.getElementById('cartCompra').innerHTML=renderCartCompra();const btn=document.getElementById('btnSaveCompra');if(btn){btn.disabled=_cartCompra.length===0;btn.innerHTML='\u2705 Guardar Todo ('+_cartCompra.length+')'}}
function renderCartCompra(){if(!_cartCompra.length)return'';const total=_cartCompra.reduce(function(s,c){return s+c.precio},0);return'<div class="cart-header"><span class="ch-title">\u{1F6D2} Lista</span><span class="ch-count">'+_cartCompra.length+' items</span></div>'+_cartCompra.map(function(c,i){return'<div class="cart-item"><div class="ci-info"><div class="ci-name">'+c.prod+'</div><div class="ci-meta">'+c.qty+' '+c.unidad+' x '+fmt$(c.precioUnit||c.precio)+' \u00b7 '+c.prov+(c.ticket==='SI'?' \u00b7 \u{1F9FE}':'')+'</div></div><span class="ci-price">'+fmt$(c.precio)+'</span><button class="ci-del" onclick="removeCartCompra('+i+')">\u2716</button></div>'}).join('')+'<div class="cart-total"><span class="ct-label">Total</span><span class="ct-amount">'+fmt$(total)+'</span></div>'}
async function submitCartCompra(){showWorking();if(!_cartCompra.length)return;const totalCount=_cartCompra.length;const n=now();const totalMoney=_cartCompra.reduce(function(s,c){return s+c.precio},0);var syncItems=[];_cartCompra.forEach(function(c){var id=nextId('C',S.compras);S.compras.unshift({id:id,fecha:n.date,hora:n.time,categoria:c.cat,producto:c.prod,cantidad:c.qty,unidad:c.unidad,precio:c.precio,proveedor:c.prov,ticket:c.ticket,comprador:uName(),notas:c.notas,_row:9999});syncItems.push({sheet:'\u{1F9FE} Compras',values:[id,n.date,n.time,c.cat,c.prod,c.qty,c.unidad,c.precio,c.prov,c.ticket,uName(),c.notas],_priceUpdate:{producto:c.prod,precio:c.precioUnit||c.precio/c.qty}})});syncItems.push({sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Compras registradas',totalCount+' items por '+fmt$(totalMoney),'compra']});clearCartCompra();toast('\u2705 '+totalCount+' compras guardadas \u2014 '+fmt$(totalMoney));modalType=null;hideWorking();render();SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500);else{toast('\u26a0\ufe0f Error de sync - reintentando...',1)}})}

let _cartNewProd=[];
function addToCartNewProd(){let cat=document.getElementById('fNPC').value;const nc=document.getElementById('fNCN')?.value?.trim()||'';const nm=document.getElementById('fNPN').value.trim();const un=document.getElementById('fNPU').value;const pr=document.getElementById('fNPP').value||'0';if(cat==='__new__'){if(!nc){toast('Escribe categor\u00eda',1);hideWorking();return}cat=nc}if(!cat||!nm){toast('Completa campos',1);hideWorking();return}if(S.catalogo.some(function(p){return p.producto.trim().toLowerCase()===nm.toLowerCase()})||_cartNewProd.some(function(c){return c.nombre.toLowerCase()===nm.toLowerCase()})){toast('Ya existe',1);hideWorking();return}_cartNewProd.push({cat,nombre:nm,unidad:un,precioRef:parseFloat(pr)});toast(nm+' agregado');document.getElementById('fNPN').value='';document.getElementById('fNPP').value='';document.getElementById('cartNewProd').innerHTML=renderCartNewProd();const btn=document.getElementById('btnSaveNewProd');if(btn){btn.disabled=false;btn.innerHTML='\u2705 Guardar Todo ('+_cartNewProd.length+')'}}

async function submitCartNewProd(){showWorking();if(!_cartNewProd.length||!canAddProduct())return;var n=now();var syncItems=[];_cartNewProd.forEach(function(c){var id=nextId('P',S.catalogo);S.catalogo.push({id:id,categoria:c.cat,producto:c.nombre,unidad:c.unidad,precioRef:c.precioRef,activo:'SI',_row:9999});syncItems.push({sheet:'\u{1F6D2} Cat\u00e1logo',values:[id,c.cat,c.nombre,c.unidad,c.precioRef,'SI']});syncItems.push({sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Producto agregado',c.nombre,'add']})});var count=_cartNewProd.length;_cartNewProd=[];toast(count+' productos guardados');closeModal();hideWorking();render();SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)})}

async function subFondo(){showWorking();if(!canEditMoney())return;const m=document.getElementById('fFM').value,notas=document.getElementById('fFN').value;if(!m||parseFloat(m)<=0){toast('Ingresa monto',1);hideWorking();return}const id=nextId('F',S.fondos);const t=now();const monto=parseFloat(m);S.fondos.unshift({id:id,fecha:t.date,hora:t.time,tipo:'Asignaci\u00f3n',monto:monto,responsable:uName(),notas:notas,_row:9999});SyncQueue.add([{sheet:'\u{1F4B5} Fondos',values:[id,t.date,t.time,'Asignaci\u00f3n',monto,uName(),notas]},{sheet:'\u{1F4DC} Bit\u00e1cora',values:[t.date,t.time,uName(),'Fondo asignado',fmt$(monto),'fondo']}],function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast('Fondo: '+fmt$(monto));closeModal();hideWorking();render()}

function fmAdminCompra(){var cats=getCats();var provOpts=S.proveedores.map(function(p){return'<option value="'+p.nombre+'">'+p.nombre+'</option>'}).join('');var userOpts=S.usuarios.map(function(u){return'<option value="'+u.nombre+'"'+(u.nombre===uName()?' selected':'')+'>'+u.nombre+'</option>'}).join('');return'<div class="modal-title">\u{1F511} Compra Manual (Admin)</div><div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blue)">Registrar compra para fecha: <strong>'+_adminCompraDate+'</strong></div><div class="form-group"><label class="form-label">Producto</label><div id="acPWrap"><div class="autocomplete-wrap"><input class="form-input" id="acP" placeholder="\u{1F50D} Buscar producto..." oninput="acInputFor(\'acP\')" onfocus="acInputFor(\'acP\')" autocomplete="off"><div class="autocomplete-list" id="acPList"></div></div></div></div><div style="display:flex;gap:10px"><div class="form-group" style="flex:1"><label class="form-label">Cantidad</label><input class="form-input" id="acQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1" oninput="calcAdminCompra()"></div><div class="form-group" style="flex:1"><label class="form-label">Precio Unit. $</label><input class="form-input" id="acPr" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01" oninput="calcAdminCompra()"></div></div><div id="acTotalPreview"></div><div class="form-group"><label class="form-label">Proveedor</label><select class="form-select" id="acPv"><option value="">Seleccionar...</option>'+provOpts+'</select></div><div class="form-group"><label class="form-label">\u00bfTiene ticket?</label><select class="form-select" id="acTk"><option value="SI">\u{1F9FE} S\u00ed</option><option value="NO">\u274c No</option></select></div><div class="form-group"><label class="form-label">Comprador</label><select class="form-select" id="acUsr">'+userOpts+'</select></div><div class="form-group"><label class="form-label">Hora (aprox)</label><input class="form-input" id="acHr" type="time" value="'+now().time.substring(0,5)+'"></div><div class="form-group"><label class="form-label">Notas</label><textarea class="form-textarea" id="acNt" placeholder="Ej: Compra manual por admin - correcci\u00f3n"></textarea></div><button class="btn btn-success" onclick="submitAdminCompra()">\u2705 Guardar Compra</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">\u2716 Cerrar</button>'}
function calcAdminCompra(){var q=parseFloat(document.getElementById('acQ')?.value)||0;var p=parseFloat(document.getElementById('acPr')?.value)||0;var el=document.getElementById('acTotalPreview');if(!el)return;if(q>0&&p>0){el.innerHTML='<div style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;text-align:center"><div style="font-size:12px;color:var(--text2)">Total:</div><div style="font-family:Space Mono;font-size:22px;font-weight:700;color:var(--green)">'+fmt$(q*p)+'</div></div>'}else{el.innerHTML=''}}
async function submitAdminCompra(){showWorking();if(!isAdmin())return;var prod=acGetVal('acP');var qty=parseFloat(document.getElementById('acQ')?.value)||0;var price=parseFloat(document.getElementById('acPr')?.value)||0;var prov=document.getElementById('acPv')?.value||'';var ticket=document.getElementById('acTk')?.value||'SI';var user=document.getElementById('acUsr')?.value||uName();var hora=document.getElementById('acHr')?.value||now().time;var notas=document.getElementById('acNt')?.value||'';if(!prod){toast('Selecciona producto',1);hideWorking();return}if(qty<=0||price<=0){toast('Pon cantidad y precio',1);hideWorking();return}if(!prov){toast('Selecciona proveedor',1);hideWorking();return}var total=qty*price;var p=S.catalogo.find(function(x){return x.producto===prod});var id=nextId('C',S.compras);var t=now();var fullNotas=notas?'[ADMIN] '+notas:'[ADMIN] Compra manual';S.compras.unshift({id:id,fecha:_adminCompraDate,hora:hora,categoria:p?.categoria||'',producto:prod,cantidad:qty,unidad:p?.unidad||'pza',precio:total,proveedor:prov,ticket:ticket,comprador:user,notas:fullNotas,_row:9999});SyncQueue.add([{sheet:'\u{1F9FE} Compras',values:[id,_adminCompraDate,hora,p?.categoria||'',prod,qty,p?.unidad||'pza',total,prov,ticket,user,fullNotas]},{sheet:'\u{1F4DC} Bit\u00e1cora',values:[t.date,t.time,uName(),'Compra manual admin',prod+' x'+qty+' '+fmt$(total)+' ('+_adminCompraDate+') comprador: '+user,'admin_compra']}],function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast('\u2705 Compra registrada');closeModal();hideWorking();render()}
async function subNewProv(){showWorking();const nm=document.getElementById('fPvN').value.trim(),tp=document.getElementById('fPvT').value;if(!nm){toast('Escribe nombre',1);hideWorking();return}if(S.proveedores.some(function(p){return p.nombre.toLowerCase()===nm.toLowerCase()})){toast('Ya existe',1);hideWorking();return}const id=nextId('PV',S.proveedores);const t=now();S.proveedores.push({id:id,nombre:nm,tipo:tp,activo:'SI',_row:9999});SyncQueue.add([{sheet:'\u{1F3EA} Proveedores',values:[id,nm,tp,'SI']},{sheet:'\u{1F4DC} Bit\u00e1cora',values:[t.date,t.time,uName(),'Proveedor agregado',nm+' ('+tp+')','add']}],function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast(nm+' agregado');closeModal();hideWorking();render()}

function renderPedidos(){const q=S.searchQuery.toLowerCase();var showArchived=S._showArchived||false;let pedsFilt=S.pedidos;if(!showArchived)pedsFilt=pedsFilt.filter(function(p){return p.estado!=='Archivado'});if(S.filterDate)pedsFilt=pedsFilt.filter(function(p){return p.fecha===S.filterDate});const grouped={};pedsFilt.forEach(function(p){const key=p.fecha+' | '+p.titulo;if(!grouped[key])grouped[key]={fecha:p.fecha,hora:p.hora,titulo:p.titulo,creador:p.creador,estado:p.estado,items:[],total:0};grouped[key].items.push(p);grouped[key].total+=p.subtotal});const keys=Object.keys(grouped);const filtered=q?keys.filter(function(k){return k.toLowerCase().includes(q)||grouped[k].items.some(function(i){return i.producto.toLowerCase().includes(q)})}):keys;var archivedCount=S.pedidos.filter(function(p){return p.estado==='Archivado'}).length;

function getCheckin(items,fecha,titulo){var tag='[PED:'+titulo+'|'+fecha+']';var tagOld='[PED:'+titulo+']';return items.map(function(p){var comprado=S.compras.filter(function(c){return c.producto.trim().toLowerCase()===p.producto.trim().toLowerCase()&&((c.notas||'').indexOf(tag)!==-1||((c.notas||'').indexOf(tagOld)!==-1&&(c.notas||'').indexOf('|')===-1&&c.fecha===fecha))});var qtyComprada=comprado.reduce(function(s,c){return s+c.cantidad},0);var totalGastado=comprado.reduce(function(s,c){return s+c.precio},0);return{id:p.id,_row:p._row,producto:p.producto,cantidad:p.cantidad,unidad:p.unidad,precioRef:p.precioRef,subtotal:p.subtotal,qtyComprada:qtyComprada,totalGastado:totalGastado,completo:qtyComprada>=p.cantidad,parcial:qtyComprada>0&&qtyComprada<p.cantidad,pendiente:qtyComprada===0,faltante:Math.max(0,p.cantidad-qtyComprada),compras:comprado}})}

function renderPedidosList(keys,grouped){if(!keys.length)return'<div class="empty-state"><div class="empty-icon">📋</div><p>Sin pedidos</p></div>';var selCount=getSelectedCount();var bulkBar=canEditItems()&&keys.length>1?'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 14px;background:var(--surface2);border-radius:10px"><button style="background:none;border:2px solid '+(selCount>0?'var(--accent)':'var(--surface3)')+';width:22px;height:22px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--accent);flex-shrink:0" onclick="selectAllPedidos('+JSON.stringify(keys).replace(/"/g,'&quot;')+')">'+(selCount>0?'✓':'')+'</button><span style="font-size:12px;color:var(--text2);flex:1">'+(selCount>0?selCount+' seleccionado(s)':'Seleccionar pedidos')+'</span>'+(selCount>0?'<button class="btn-sm" style="background:var(--green);color:#1a120e;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans" onclick="bulkPedidoAction(\'completar\',grouped)">✅</button><button class="btn-sm" style="background:var(--blue);color:#1a120e;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans" onclick="bulkPedidoAction(\'archivar\',grouped)">📦</button>'+(isAdmin()?'<button class="btn-sm" style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans" onclick="bulkPedidoAction(\'eliminar\',grouped)">🗑</button>':''):'')+'</div>':'';return bulkBar+keys.map(function(k){var g=grouped[k];var checkin=getCheckin(g.items,g.fecha,g.titulo);var completados=checkin.filter(function(c){return c.completo}).length;var totItems=checkin.length;var faltantes=checkin.filter(function(c){return!c.completo});var pctComplete=totItems>0?Math.round(completados/totItems*100):0;var gastadoReal=checkin.reduce(function(s,c){return s+c.totalGastado},0);var _pk=k.replace(/[^a-zA-Z0-9]/g,'_');var _ex=_expandedPedidos[_pk];var _sel=_selectedPedidos[k];var origHora=g.hora;return'<div class="card" id="ped_'+_pk+'" style="margin-bottom:12px;border:'+(_sel?'2px solid var(--accent)':'1px solid rgba(255,255,255,.04)')+'"><div style="display:flex;align-items:center;gap:10px">'+(canEditItems()&&keys.length>1?'<button style="background:none;border:2px solid '+(_sel?'var(--accent)':'var(--surface3)')+';width:24px;height:24px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--accent);flex-shrink:0" onclick="togglePedidoSelect(\''+k.replace(/'/g,"\\'")+'\',event)">'+(_sel?'✓':'')+'</button>':'')+'<div style="flex:1;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="togglePedido(\''+_pk+'\')"><div><div style="font-size:16px;font-weight:700">'+(_ex?'▼':'▶')+' '+g.titulo+'</div><div class="record-meta"><span>📅 '+g.fecha+'</span><span>🕒 '+g.hora+'</span><span>👤 '+g.creador+'</span></div></div><span class="badge '+(g.estado==='Archivado'?'info':g.estado==='Completado'?'closed':pctComplete===100?'good':'pending')+'">'+(g.estado==='Archivado'?'📦 Archivado':g.estado==='Completado'?'✅ Completado':pctComplete===100?'✅ 100%':'⏳ '+pctComplete+'%')+'</span></div></div>'+(_ex?'<div style="margin-top:10px"><div style="background:var(--surface3);border-radius:6px;height:6px;margin-bottom:12px;overflow:hidden"><div style="background:var(--green);height:100%;width:'+pctComplete+'%;border-radius:6px;transition:width .3s"></div></div>'+checkin.map(function(c){var icon=c.completo?'✅':c.parcial?'🟡':'🔴';var statusColor=c.completo?'var(--green)':c.parcial?'var(--yellow)':'var(--red)';var origItem=g.items.find(function(p){return p.id===c.id});var itemHora=origItem?origItem.hora:'';var isAdded=itemHora.indexOf('[+')!==-1;var addedTag='';if(isAdded){var m=itemHora.match(/\\[\\+(.+?)\\]/);addedTag=m?'<div style="font-size:9px;color:var(--cyan);margin-top:2px">🕐 Agregado: '+m[1]+' a las '+itemHora.split(' [')[0]+'</div>':''}return'<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px"><div style="flex:1"><span>'+icon+' '+c.producto+'</span><div style="font-size:10px;color:var(--text2)">Pedido: '+c.cantidad+' '+c.unidad+(c.qtyComprada>0?' · Comprado: '+c.qtyComprada:'')+(c.faltante>0&&!c.completo?' · <span style="color:var(--red)">Falta: '+c.faltante+'</span>':'')+'</div>'+addedTag+'</div><div style="text-align:right"><div style="font-family:Space Mono;font-weight:700;font-size:12px;color:'+statusColor+'">'+fmt$(c.totalGastado)+'</div><div style="font-size:10px;color:var(--text2)">Est: '+fmt$(c.subtotal)+'</div></div>'+(canEditItems()?'<button style="background:none;border:none;font-size:14px;cursor:pointer;padding:4px 6px;margin-left:4px" onclick="event.stopPropagation();openEditPedidoItem(\''+c.id+'\','+c._row+')">✏️</button>':'')+'</div>'}).join('')+'<div style="display:flex;gap:10px;margin-top:12px"><div class="cart-total" style="flex:1;margin:0"><span class="ct-label">Estimado</span><span class="ct-amount" style="font-size:14px">'+fmt$(g.total)+'</span></div><div class="cart-total" style="flex:1;margin:0"><span class="ct-label">Real</span><span class="ct-amount" style="font-size:14px;color:var(--green)">'+fmt$(gastadoReal)+'</span></div></div>'+(canManagePedido()&&g.estado!=='Completado'&&g.estado!=='Archivado'?'<button class="btn btn-sm" style="margin-top:10px;width:100%;background:rgba(34,211,238,.15);border:1px solid rgba(34,211,238,.3);color:var(--cyan)" onclick="event.stopPropagation();openAddToPedido(\''+g.titulo.replace(/'/g,"\\'")+'\',\''+g.fecha+'\')">➕ Agregar productos</button>':'')+(faltantes.length>0&&canOrder()?'<button class="btn btn-orange btn-sm" style="margin-top:8px;width:100%" onclick="reorderFaltantes(\''+g.titulo.replace(/'/g,"\\'")+'\',\''+g.fecha+'\')">📋 Crear pedido con '+faltantes.length+' faltantes</button>':'')+(canEditItems()&&g.estado!=='Completado'&&g.estado!=='Archivado'?'<button class="btn btn-success btn-sm" style="margin-top:8px;width:100%" onclick="completarPedido(\''+g.titulo.replace(/'/g,"\\'")+'\',\''+g.fecha+'\')">✅ Marcar Completado</button>':'')+(canEditItems()&&g.estado!=='Archivado'?'<button class="btn btn-sm" style="margin-top:8px;width:100%;background:rgba(96,165,250,.15);border:1px solid rgba(96,165,250,.3);color:var(--blue)" onclick="event.stopPropagation();archivarPedido(\''+g.titulo.replace(/'/g,"\\'")+'\',\''+g.fecha+'\')">📦 Archivar Pedido</button>':'')+(g.estado==='Archivado'&&canEditItems()?'<button class="btn btn-sm" style="margin-top:8px;width:100%;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--green)" onclick="event.stopPropagation();desarchivarPedido(\''+g.titulo.replace(/'/g,"\\'")+'\',\''+g.fecha+'\')">📤 Desarchivar</button>':'')+(isAdmin()?'<button class="btn btn-sm" style="margin-top:8px;width:100%;background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:var(--red)" onclick="event.stopPropagation();deletePedidoCompleto(\''+g.titulo.replace(/'/g,"\\'")+'\')"  >🗑 Eliminar Pedido</button>':'')+'</div>':'')+'</div>'}).join('')}

async function deletePedidoCompleto(titulo){if(!isAdmin())return;showConfirm("Eliminar Pedido","Eliminar pedido completo con todos sus items?",async function(){showWorking();var rows=[];S.pedidos.forEach(function(p){if(p.titulo===titulo)rows.push(p._row)});rows.sort(function(a,b){return b-a});var results=await Promise.allSettled(rows.map(function(r){return Sheets.deleteRow("\u{1F4CB} Pedidos",r)}));var ok=results.filter(function(r){return r.status==='fulfilled'}).length;S.pedidos=S.pedidos.filter(function(p){return p.titulo!==titulo});logAction("Pedido eliminado",titulo+" - "+ok+" items","delete");toast(ok+" items eliminados");hideWorking();render();setTimeout(function(){Sheets.loadAll()},500)})}
async function reorderFaltantes(titulo,fecha){var items=S.pedidos.filter(function(p){return p.titulo===titulo&&p.fecha===fecha});var checkin=getCheckin(items,fecha,titulo);var faltantes=checkin.filter(function(c){return!c.completo&&c.faltante>0});if(!faltantes.length){toast('Todo completo',0);return}showWorking();var n=now();var newTitulo='Faltantes: '+titulo;var syncItems=[];var totalEst=0;faltantes.forEach(function(f){var id=nextId('PD',S.pedidos);var sub=f.precioRef*f.faltante;totalEst+=sub;S.pedidos.unshift({id:id,fecha:n.date,hora:n.time,titulo:newTitulo,producto:f.producto,cantidad:f.faltante,unidad:f.unidad,precioRef:f.precioRef,subtotal:sub,creador:uName(),estado:'Pendiente',_row:9999});syncItems.push({sheet:'\u{1F4CB} Pedidos',values:[id,n.date,n.time,newTitulo,f.producto,f.faltante,f.unidad,f.precioRef,sub,uName(),'Pendiente']})});syncItems.push({sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Pedido de faltantes',newTitulo+' - '+faltantes.length+' items - '+fmt$(totalEst),'pedido']});SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)});toast('Pedido creado: '+faltantes.length+' faltantes');hideWorking();render()}

function addToCartPedido(){var titulo=document.getElementById('fPdT').value.trim();var prod=acGetVal('fPdP');var qty=document.getElementById('fPdQ').value;if(!titulo){toast('Escribe t\u00edtulo',1);hideWorking();return}if(!prod||!qty){toast('Completa campos',1);hideWorking();return}var p=S.catalogo.find(function(x){return x.producto===prod});var precio=p?p.precioRef:0;var sub=precio*parseFloat(qty);_cartPedido.push({prod:prod,cat:p?.categoria||'',qty:parseFloat(qty),unidad:p?.unidad||'',precioRef:precio,subtotal:sub});toast(prod+' agregado');acClearC('fPdP');document.getElementById('fPdQ').value='';var pi=document.getElementById('fPdPriceInfo');if(pi)pi.innerHTML='';document.getElementById('cartPedido').innerHTML=renderCartPedido();var btn=document.getElementById('btnSavePedido');if(btn){btn.disabled=false;btn.innerHTML='\u2705 Crear Pedido ('+_cartPedido.length+')'}}

async function submitCartPedido(){showWorking();if(!_cartPedido.length)return;var titulo=document.getElementById('fPdT').value.trim();if(!titulo){toast('Escribe t\u00edtulo',1);hideWorking();return}var n=now();var syncItems=[];var totalEst=_cartPedido.reduce(function(s,c){return s+c.subtotal},0);_cartPedido.forEach(function(c){var id=nextId('PD',S.pedidos);S.pedidos.unshift({id:id,fecha:n.date,hora:n.time,titulo:titulo,producto:c.prod,cantidad:c.qty,unidad:c.unidad,precioRef:c.precioRef,subtotal:c.subtotal,creador:uName(),estado:'Pendiente',_row:9999});syncItems.push({sheet:'\u{1F4CB} Pedidos',values:[id,n.date,n.time,titulo,c.prod,c.qty,c.unidad,c.precioRef,c.subtotal,uName(),'Pendiente']})});syncItems.push({sheet:'\u{1F4DC} Bit\u00e1cora',values:[n.date,n.time,uName(),'Pedido creado',titulo+' - '+_cartPedido.length+' items - '+fmt$(totalEst),'pedido']});var count=_cartPedido.length;_cartPedido=[];toast('Pedido creado: '+fmt$(totalEst));closeModal();hideWorking();render();SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)})}

async function completarPedido(titulo,fecha){showConfirm('\u2705 Completar Pedido','Marcar "'+titulo+'" como completado?',async function(){showWorking();var items=S.pedidos.filter(function(p){return p.titulo===titulo&&p.fecha===fecha&&p.estado!=='Completado'});if(!items.length){toast('No hay items pendientes');hideWorking();return}await Promise.allSettled(items.map(function(p){return Sheets.deleteRow('\u{1F4CB} Pedidos',p._row).then(function(){return Sheets.append('\u{1F4CB} Pedidos',[p.id,p.fecha,p.hora,p.titulo,p.producto,p.cantidad,p.unidad,p.precioRef,p.subtotal,p.creador,'Completado'])})}));items.forEach(function(p){p.estado='Completado'});logAction('Pedido completado',titulo,'pedido');toast('Pedido completado');hideWorking();render();setTimeout(function(){Sheets.loadAll()},500)})}

function desarchivarPedido(titulo,fecha){showConfirm('\u{1F4E4} Desarchivar','Restaurar "'+titulo+'" a la lista activa?',async function(){showWorking();var items=S.pedidos.filter(function(p){return p.titulo===titulo&&p.fecha===fecha&&p.estado==='Archivado'});if(!items.length){toast('No hay items');hideWorking();return}await Promise.allSettled(items.map(function(p){return Sheets.deleteRow('\u{1F4CB} Pedidos',p._row).then(function(){return Sheets.append('\u{1F4CB} Pedidos',[p.id,p.fecha,p.hora,p.titulo,p.producto,p.cantidad,p.unidad,p.precioRef,p.subtotal,p.creador,'Pendiente'])})}));items.forEach(function(p){p.estado='Pendiente'});logAction('Pedido desarchivado',titulo,'archive');toast('\u{1F4E4} Pedido restaurado');hideWorking();render();setTimeout(function(){Sheets.loadAll()},500)})}

S.rptPreset='hoy';S.rptSection='general';S._rptOpenDetails={};

function rptParseDate(dateStr){if(!dateStr)return null;var parts=dateStr.split('/');if(parts.length!==3)return null;return new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]))}
function rptFmtInput(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function rptInputToDisplay(val){if(!val)return'';var p=val.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function rptIsInRange(dateStr,from,to){var d=rptParseDate(dateStr);if(!d)return false;if(from){var f=new Date(from+'T00:00:00');if(d<f)return false}if(to){var t=new Date(to+'T23:59:59');if(d>t)return false}return true}

function rptGetPresets(){var n=new Date();var hoy=rptFmtInput(n);var ayer=new Date(n);ayer.setDate(ayer.getDate()-1);var lunes=new Date(n);lunes.setDate(lunes.getDate()-((lunes.getDay()+6)%7));var mes1=new Date(n.getFullYear(),n.getMonth(),1);var d7=new Date(n);d7.setDate(d7.getDate()-6);var d30=new Date(n);d30.setDate(d30.getDate()-29);return{hoy:{from:hoy,to:hoy,label:'Hoy'},ayer:{from:rptFmtInput(ayer),to:rptFmtInput(ayer),label:'Ayer'},semana:{from:rptFmtInput(lunes),to:hoy,label:'Esta Semana'},'7dias':{from:rptFmtInput(d7),to:hoy,label:'7 dias'},mes:{from:rptFmtInput(mes1),to:hoy,label:'Este Mes'},'30dias':{from:rptFmtInput(d30),to:hoy,label:'30 dias'},custom:{from:'',to:'',label:'Personalizado'}}}

function rptSetPreset(key){var presets=rptGetPresets();var p=presets[key];if(p){S.rptPreset=key;if(key!=='custom'){S.reportDateFrom=p.from;S.reportDateTo=p.to}}render()}
function rptSetCustomFrom(val){S.reportDateFrom=val;S.rptPreset='custom';render()}
function rptSetCustomTo(val){S.reportDateTo=val;S.rptPreset='custom';render()}

function rptGetFiltered(){var from=S.reportDateFrom;var to=S.reportDateTo;return{compras:S.compras.filter(function(c){return rptIsInRange(c.fecha,from,to)}),pedidos:S.pedidos.filter(function(p){return rptIsInRange(p.fecha,from,to)}),fondos:S.fondos.filter(function(f){return rptIsInRange(f.fecha,from,to)})}}

function rptToggleDetail(key){S._rptOpenDetails[key]=!S._rptOpenDetails[key];var el=document.getElementById('rptDetail_'+key);if(el)el.className=S._rptOpenDetails[key]?'rpt-detail-list open':'rpt-detail-list'}

function rptInitDates(){if(!S.reportDateFrom||!S.reportDateTo){var presets=rptGetPresets();S.reportDateFrom=presets.hoy.from;S.reportDateTo=presets.hoy.to;S.rptPreset='hoy'}}

var RPT_COLORS=['#e07840','#34d399','#60a5fa','#fbbf24','#f87171','#22d3ee','#fb923c','#a78bfa','#f472b6','#4ade80','#38bdf8','#facc15'];
function rptColor(i){return RPT_COLORS[i%RPT_COLORS.length]}

function renderReportes(){
  rptInitDates();
  var presets=rptGetPresets();
  var data=rptGetFiltered();
  var compras=data.compras;var pedidos=data.pedidos;var fondos=data.fondos;

  var totalGastado=compras.reduce(function(s,c){return s+c.precio},0);
  var totalAsignado=fondos.filter(function(f){return f.tipo==='Asignacion'||f.tipo==='Asignación'}).reduce(function(s,f){return s+f.monto},0);
  var totalDevuelto=fondos.filter(function(f){return f.tipo==='Devolucion'||f.tipo==='Devolución'}).reduce(function(s,f){return s+f.monto},0);
  var numCompras=compras.length;
  var promedio=numCompras>0?totalGastado/numCompras:0;
  var pedidosPend=pedidos.filter(function(p){return p.estado==='Pendiente'});

  var byCategoria={};var byProducto={};var byComprador={};var byProveedor={};var byCreador={};var byDia={};

  compras.forEach(function(c){
    var cat=c.categoria||'Sin categoria';
    if(!byCategoria[cat])byCategoria[cat]={total:0,items:0,productos:{}};
    byCategoria[cat].total+=c.precio;byCategoria[cat].items++;
    if(!byCategoria[cat].productos[c.producto])byCategoria[cat].productos[c.producto]={total:0,qty:0,unit:c.unidad};
    byCategoria[cat].productos[c.producto].total+=c.precio;byCategoria[cat].productos[c.producto].qty+=c.cantidad;

    if(!byProducto[c.producto])byProducto[c.producto]={total:0,qty:0,cat:c.categoria,unit:c.unidad,compras:0};
    byProducto[c.producto].total+=c.precio;byProducto[c.producto].qty+=c.cantidad;byProducto[c.producto].compras++;

    var comp=c.comprador||'Sin asignar';
    if(!byComprador[comp])byComprador[comp]={total:0,items:0,categorias:{}};
    byComprador[comp].total+=c.precio;byComprador[comp].items++;
    if(!byComprador[comp].categorias[cat])byComprador[comp].categorias[cat]=0;
    byComprador[comp].categorias[cat]+=c.precio;

    var prov=c.proveedor||'Sin proveedor';
    if(!byProveedor[prov])byProveedor[prov]={total:0,items:0};
    byProveedor[prov].total+=c.precio;byProveedor[prov].items++;

    if(!byDia[c.fecha])byDia[c.fecha]={total:0,items:0};
    byDia[c.fecha].total+=c.precio;byDia[c.fecha].items++;
  });

  pedidos.forEach(function(p){
    var cr=p.creador||'Sin asignar';
    if(!byCreador[cr])byCreador[cr]={total:0,pendientes:0,cumplidos:0,montoRef:0};
    byCreador[cr].total++;byCreador[cr].montoRef+=p.subtotal||0;
    if(p.estado==='Pendiente')byCreador[cr].pendientes++;else byCreador[cr].cumplidos++;
  });

  var catSorted=Object.entries(byCategoria).sort(function(a,b){return b[1].total-a[1].total});
  var prodSorted=Object.entries(byProducto).sort(function(a,b){return b[1].total-a[1].total});
  var compSorted=Object.entries(byComprador).sort(function(a,b){return b[1].total-a[1].total});
  var provSorted=Object.entries(byProveedor).sort(function(a,b){return b[1].total-a[1].total});
  var creSorted=Object.entries(byCreador).sort(function(a,b){return b[1].total-a[1].total});
  var diaSorted=Object.entries(byDia).sort(function(a,b){var da=rptParseDate(a[0]),db=rptParseDate(b[0]);return(db?db.getTime():0)-(da?da.getTime():0)});

  var maxProd=prodSorted.length>0?prodSorted[0][1].total:1;
  var maxProv=provSorted.length>0?provSorted[0][1].total:1;
  var maxDia=diaSorted.length>0?Math.max.apply(null,diaSorted.map(function(d){return d[1].total})):1;

  var sec=S.rptSection||'general';
  var html='';

  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span class="card-title" style="margin:0">\u{1F4CA} Reportes</span><span style="font-size:11px;color:var(--text2)">'+numCompras+' compras</span></div>';

  html+='<div class="rpt-date-bar">';
  Object.keys(presets).forEach(function(key){html+='<button class="rpt-date-btn '+(S.rptPreset===key?'active':'')+'" onclick="rptSetPreset(\''+key+'\')">'+presets[key].label+'</button>'});
  html+='</div>';

  html+='<div class="rpt-custom-dates"><input type="date" value="'+S.reportDateFrom+'" onchange="rptSetCustomFrom(this.value)" style="color-scheme:dark"><input type="date" value="'+S.reportDateTo+'" onchange="rptSetCustomTo(this.value)" style="color-scheme:dark"></div>';

  html+='<div class="tab-pills" style="margin-bottom:16px">';
  html+='<button class="tab-pill '+(sec==='general'?'active':'')+'" onclick="S.rptSection=\'general\';render()">\u{1F4B0} General</button>';
  html+='<button class="tab-pill '+(sec==='categorias'?'active':'')+'" onclick="S.rptSection=\'categorias\';render()">\u{1F4E6} Categorias</button>';
  html+='<button class="tab-pill '+(sec==='productos'?'active':'')+'" onclick="S.rptSection=\'productos\';render()">\u{1F6D2} Productos</button>';
  html+='<button class="tab-pill '+(sec==='personas'?'active':'')+'" onclick="S.rptSection=\'personas\';render()">\u{1F464} Personas</button>';
  html+='<button class="tab-pill '+(sec==='proveedores'?'active':'')+'" onclick="S.rptSection=\'proveedores\';render()">\u{1F3EA} Proveedores</button>';
  html+='<button class="tab-pill '+(sec==='pendientes'?'active':'')+'" onclick="S.rptSection=\'pendientes\';render()">\u26A0\uFE0F Sin Comprar</button>';
  html+='<button class="tab-pill '+(sec==='diario'?'active':'')+'" onclick="S.rptSection=\'diario\';render()">\u{1F4C5} Por Dia</button>';
  html+='</div>';

  if(numCompras===0&&pedidos.length===0){
    html+='<div class="rpt-empty"><div style="font-size:48px;margin-bottom:12px">\u{1F4CA}</div><p>No hay datos para este periodo</p><p style="margin-top:8px;font-size:12px">Selecciona otro rango de fechas</p></div>';
    return html;
  }

  if(sec==='general'){
    html+='<div class="stats-grid"><div class="stat-box red"><div class="stat-number">'+fmt$(totalGastado)+'</div><div class="stat-label">Total Gastado</div></div>';
    html+='<div class="stat-box green"><div class="stat-number">'+fmt$(totalAsignado)+'</div><div class="stat-label">Total Asignado</div></div>';
    html+='<div class="stat-box blue"><div class="stat-number">'+fmt$(totalAsignado-totalGastado)+'</div><div class="stat-label">Diferencia</div></div>';
    html+='<div class="stat-box orange"><div class="stat-number">'+numCompras+'</div><div class="stat-label">Compras</div></div>';
    html+='<div class="stat-box yellow"><div class="stat-number">'+fmt$(promedio)+'</div><div class="stat-label">Promedio/Compra</div></div>';
    html+='<div class="stat-box cyan"><div class="stat-number">'+pedidosPend.length+'</div><div class="stat-label">Pedidos Pend.</div></div></div>';

      html+='<div class="rpt-person-card"><div class="rpt-person-header"><div class="rpt-person-av" style="background:var(--blue);color:#1a120e">'+name.split(' ').map(function(w){return w[0]}).join('').toUpperCase().slice(0,2)+'</div><div><div class="rpt-person-name">'+name+'</div><div class="rpt-person-role">Solicitante</div></div></div>';
      html+='<div class="rpt-person-stats"><div class="rpt-person-stat"><div class="ps-val" style="color:var(--blue)">'+d.total+'</div><div class="ps-lbl">Pedidos</div></div><div class="rpt-person-stat"><div class="ps-val" style="color:var(--green)">'+d.cumplidos+'</div><div class="ps-lbl">Cumplidos</div></div><div class="rpt-person-stat"><div class="ps-val" style="color:var(--yellow)">'+d.pendientes+'</div><div class="ps-lbl">Pendientes</div></div></div>';

  if(sec==='proveedores'){

    if(provSorted.length===0){html+='<div class="rpt-empty">\u{1F3EA} Sin datos</div>'}
    else{html+='<div style="font-size:11px;color:var(--text2);margin-bottom:10px">'+provSorted.length+' proveedores</div>';
      provSorted.forEach(function(entry,i){var name=entry[0];var d=entry[1];var pct=totalGastado>0?Math.round(d.total/totalGastado*100):0;
        html+='<div class="rpt-bar-row"><div class="rpt-rank '+(i<3?'top3':'')+'">'+(i+1)+'</div><div class="rpt-bar-info"><div class="rpt-bar-name">'+name+'</div><div class="rpt-bar-sub">'+d.items+' compras &middot; '+pct+'%</div><div class="rpt-bar-track"><div class="rpt-bar-fill" style="width:'+Math.round(d.total/maxProv*100)+'%;background:'+rptColor(i)+'"></div></div></div><div class="rpt-bar-vals"><div class="rpt-bar-amount">'+fmt$(d.total)+'</div><div class="rpt-bar-pct">'+pct+'%</div></div></div>'})}
    html+='</div>';
  }

  if(sec==='pendientes'){
    html+='<div class="rpt-section">';
    if(pedidosPend.length===0){html+='<div class="rpt-empty" style="color:var(--green)"><div style="font-size:48px;margin-bottom:12px">\u2705</div><p>Todos los pedidos fueron comprados</p></div>'}
    else{var montoRef=pedidosPend.reduce(function(s,p){return s+(p.subtotal||0)},0);
      html+='<div class="rpt-insight"><div class="rpt-insight-title">\u26A0\uFE0F Atencion</div>Hay <strong>'+pedidosPend.length+' productos</strong> pedidos sin comprar.'+(montoRef>0?' Monto estimado: <strong>'+fmt$(montoRef)+'</strong>.':'')+'</div>';
      var pendByCreador={};pedidosPend.forEach(function(p){var cr=p.creador||'Sin asignar';if(!pendByCreador[cr])pendByCreador[cr]=[];pendByCreador[cr].push(p)});
      Object.entries(pendByCreador).forEach(function(entry){
        html+='<div style="font-size:12px;font-weight:700;color:var(--text2);margin:12px 0 6px;text-transform:uppercase">Pedido por: '+entry[0]+'</div>';
        entry[1].forEach(function(p){html+='<div class="rpt-pending-item"><div class="rpt-pending-top"><span class="rpt-pending-prod">'+p.producto+'</span><span class="rpt-pending-qty">'+p.cantidad+' '+p.unidad+'</span></div><div class="rpt-pending-meta">'+p.fecha+' &middot; '+(p.titulo||'')+(p.precioRef>0?' &middot; Ref: '+fmt$(p.precioRef):'')+'</div></div>'})})}

  if(sec==='diario'){

        var dayCompras=compras.filter(function(c){return c.fecha===fecha});
        html+='<div class="rpt-bar-row" style="flex-wrap:wrap;cursor:pointer" onclick="rptToggleDetail(\''+key+'\')">';

        html+='</div></div>'})}
