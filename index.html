// === ADD TO EXISTING PEDIDO ===
var _addToPedidoTarget=null;
var _cartAddToPedido=[];
function canManagePedido(){return isAdmin()||isCocinero()||isCajero()}
function openAddToPedido(titulo,fecha){if(!canManagePedido()){toast('Sin permiso',1);return}_addToPedidoTarget={titulo:titulo,fecha:fecha};_cartAddToPedido=[];_acSelected={};modalType='addToPedido';render()}
function fmAddToPedido(){if(!_addToPedidoTarget)return'';return'<div class="modal-title">➕ Agregar a Pedido</div><div style="background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px"><div style="font-weight:700;margin-bottom:4px">📋 '+_addToPedidoTarget.titulo+'</div><div style="color:var(--text2);font-size:11px">Pedido original: '+_addToPedidoTarget.fecha+'</div></div><div class="form-group"><label class="form-label">Producto</label><div id="fAtpPWrap"><div class="autocomplete-wrap"><input class="form-input" id="fAtpP" placeholder="🔍 Buscar producto..." oninput="acInput(\'fAtpP\',S.catalogo,function(p){return p.producto})" onfocus="acInput(\'fAtpP\',S.catalogo,function(p){return p.producto})" autocomplete="off"><div class="autocomplete-list" id="fAtpPList"></div></div></div></div><div id="fAtpPriceInfo"></div><div class="form-group"><label class="form-label">Cantidad</label><input class="form-input" id="fAtpQ" type="number" inputmode="decimal" placeholder="0" min="0.1" step="0.1"></div><button class="btn btn-secondary" onclick="addToCartAddPedido()">➕ Agregar a lista</button><div id="cartAddPedido">'+renderCartAddPedido()+'</div><div class="cart-divider"></div><button class="btn btn-primary" onclick="submitAddToPedido()" '+(_cartAddToPedido.length===0?'disabled':'')+' id="btnSaveAddPedido">✅ Agregar '+_cartAddToPedido.length+' productos</button><div style="height:10px"></div><button class="btn btn-secondary" onclick="closeModal()">✖ Cerrar</button>'}
function addToCartAddPedido(){var prod=acGetVal('fAtpP');var qty=document.getElementById('fAtpQ').value;if(!prod||!qty){toast('Completa campos',1);return}var p=S.catalogo.find(function(x){return x.producto===prod});var precio=p?p.precioRef:0;var sub=precio*parseFloat(qty);_cartAddToPedido.push({prod:prod,cat:p?.categoria||'',qty:parseFloat(qty),unidad:p?.unidad||'',precioRef:precio,subtotal:sub});toast(prod+' agregado');acClearC('fAtpP');document.getElementById('fAtpQ').value='';var pi=document.getElementById('fAtpPriceInfo');if(pi)pi.innerHTML='';document.getElementById('cartAddPedido').innerHTML=renderCartAddPedido();var btn=document.getElementById('btnSaveAddPedido');if(btn){btn.disabled=false;btn.innerHTML='✅ Agregar '+_cartAddToPedido.length+' productos'}}
function removeCartAddPedido(i){_cartAddToPedido.splice(i,1);document.getElementById('cartAddPedido').innerHTML=renderCartAddPedido();var btn=document.getElementById('btnSaveAddPedido');if(btn){btn.disabled=_cartAddToPedido.length===0;btn.innerHTML='✅ Agregar '+_cartAddToPedido.length+' productos'}}
function renderCartAddPedido(){if(!_cartAddToPedido.length)return'';var total=_cartAddToPedido.reduce(function(s,c){return s+c.subtotal},0);return'<div class="cart-header"><span class="ch-title">📋 Productos a agregar</span><span class="ch-count">'+_cartAddToPedido.length+' items</span></div>'+_cartAddToPedido.map(function(c,i){return'<div class="cart-item"><div class="ci-info"><div class="ci-name">'+c.prod+'</div><div class="ci-meta">'+c.qty+' '+c.unidad+' x '+fmt$(c.precioRef)+'</div></div><span class="ci-price">'+fmt$(c.subtotal)+'</span><button class="ci-del" onclick="removeCartAddPedido('+i+')">✖</button></div>'}).join('')+'<div class="cart-total"><span class="ct-label">Total Estimado</span><span class="ct-amount">'+fmt$(total)+'</span></div>'}
async function submitAddToPedido(){showWorking();if(!_cartAddToPedido.length||!_addToPedidoTarget)return;var titulo=_addToPedidoTarget.titulo;var origFecha=_addToPedidoTarget.fecha;var n=now();var syncItems=[];var totalEst=_cartAddToPedido.reduce(function(s,c){return s+c.subtotal},0);_cartAddToPedido.forEach(function(c){var id=nextId('PD',S.pedidos);var horaTag=n.time+' [+'+n.date+']';S.pedidos.unshift({id:id,fecha:origFecha,hora:horaTag,titulo:titulo,producto:c.prod,cantidad:c.qty,unidad:c.unidad,precioRef:c.precioRef,subtotal:c.subtotal,creador:uName(),estado:'Pendiente',_row:9999});syncItems.push({sheet:'📋 Pedidos',values:[id,origFecha,horaTag,titulo,c.prod,c.qty,c.unidad,c.precioRef,c.subtotal,uName(),'Pendiente']})});syncItems.push({sheet:'📜 Bitácora',values:[n.date,n.time,uName(),'Productos agregados',titulo+' +'+_cartAddToPedido.length+' items ('+fmt$(totalEst)+')','pedido']});var count=_cartAddToPedido.length;_cartAddToPedido=[];_addToPedidoTarget=null;toast(count+' productos agregados');closeModal();hideWorking();render();SyncQueue.add(syncItems,function(ok){if(ok)setTimeout(function(){Sheets.loadAll()},500)})}
// Override acPick for fAtpP
var _origAcPickForAtp=acPick;
acPick=function(inputId,val){_origAcPickForAtp(inputId,val);if(inputId==='fAtpP'){var p=S.catalogo.find(function(x){return x.producto===val});var pi=document.getElementById('fAtpPriceInfo');if(pi&&p)pi.innerHTML='<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">💰 Precio ref: <strong>'+fmt$(p.precioRef)+'</strong> / '+p.unidad+'</div>'}}

// === BULK PEDIDO ACTIONS ===
var _selectedPedidos={};
function togglePedidoSelect(key,evt){if(evt)evt.stopPropagation();if(_selectedPedidos[key])delete _selectedPedidos[key];else _selectedPedidos[key]=true;render()}
function selectAllPedidos(keys){if(Object.keys(_selectedPedidos).length===keys.length){_selectedPedidos={}}else{keys.forEach(function(k){_selectedPedidos[k]=true})}render()}
function getSelectedCount(){return Object.keys(_selectedPedidos).length}
async function bulkPedidoAction(action,grouped){var selKeys=Object.keys(_selectedPedidos);if(!selKeys.length){toast('Selecciona pedidos',1);return}var labels={'completar':'Completar','archivar':'Archivar','eliminar':'Eliminar'};var msg=labels[action]+' '+selKeys.length+' pedido(s)?';showConfirm('⚡ '+labels[action],msg,async function(){showWorking();for(var i=0;i<selKeys.length;i++){var k=selKeys[i];var g=grouped[k];if(!g)continue;if(action==='completar')await _bulkComplete(g.titulo,g.fecha);else if(action==='archivar')await _bulkArchive(g.titulo,g.fecha);else if(action==='eliminar')await _bulkDelete(g.titulo)}_selectedPedidos={};toast(selKeys.length+' pedidos procesados');hideWorking();render();setTimeout(function(){Sheets.loadAll()},500)})}
async function _bulkComplete(titulo,fecha){var items=S.pedidos.filter(function(p){return p.titulo===titulo&&p.fecha===fecha&&p.estado!=='Completado'});await Promise.allSettled(items.map(function(p){return Sheets.deleteRow('📋 Pedidos',p._row).then(function(){return Sheets.append('📋 Pedidos',[p.id,p.fecha,p.hora,p.titulo,p.producto,p.cantidad,p.unidad,p.precioRef,p.subtotal,p.creador,'Completado'])})}));items.forEach(function(p){p.estado='Completado'});logAction('Pedido completado (bulk)',titulo,'pedido')}
async function _bulkArchive(titulo,fecha){var items=S.pedidos.filter(function(p){return p.titulo===titulo&&p.fecha===fecha&&p.estado!=='Archivado'});await Promise.allSettled(items.map(function(p){return Sheets.deleteRow('📋 Pedidos',p._row).then(function(){return Sheets.append('📋 Pedidos',[p.id,p.fecha,p.hora,p.titulo,p.producto,p.cantidad,p.unidad,p.precioRef,p.subtotal,p.creador,'Archivado'])})}));items.forEach(function(p){p.estado='Archivado'});logAction('Pedido archivado (bulk)',titulo,'archive')}
async function _bulkDelete(titulo){var rows=[];S.pedidos.forEach(function(p){if(p.titulo===titulo)rows.push(p._row)});rows.sort(function(a,b){return b-a});await Promise.allSettled(rows.map(function(r){return Sheets.deleteRow('📋 Pedidos',r)}));S.pedidos=S.pedidos.filter(function(p){return p.titulo!==titulo});logAction('Pedido eliminado (bulk)',titulo,'delete')}

(async function(){if(S.sheetId&&S.apiKey&&SCRIPT_URL){const su=localStorage.getItem('currentUser_compras');if(su){try{S.currentUser=JSON.parse(su);S.screen='main';S.connected=true;render();await Sheets.loadUsers();const ok=S.usuarios.find(function(u){return u.usuario===S.currentUser.usuario});if(!ok){toast('Cuenta deshabilitada',1);logout();return}await Sheets.loadAll()}catch(e){S.screen='login';render()}}else{S.screen='login';S.connected=true;await Sheets.loadUsers();render()}}else{render()}})();
</script>
